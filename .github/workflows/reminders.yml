name: LINE Bot Daily Reminders (已停用，改由 cron-job.org 觸發)
on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Reminder type (weight/sleep_check/breakfast/lunch/evening)'
        required: true
        default: 'weight'
      mode:
        description: 'Mode (workday/holiday)'
        required: false
        default: 'workday'

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Send reminder
        run: |
          TYPE="${{ github.event.inputs.type }}"
          MODE="${{ github.event.inputs.mode }}"
          echo "Sending $TYPE reminder (mode: $MODE)..."
          curl -sf "https://life-tracker-bot.vercel.app/api/remind?type=$TYPE&mode=$MODE&secret=${{ secrets.REMINDER_SECRET }}"
          echo "Done"
